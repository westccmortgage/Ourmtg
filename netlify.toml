# OurMTG lives in the ourmtg/ subdirectory. Netlify reads netlify.toml from the repo
# root, so this file points the build at that subdirectory via `base`. With base set,
# `command` runs inside ourmtg/ and `publish`/`functions` resolve relative to it
# (→ ourmtg/dist and ourmtg/netlify/functions).
[build]
  base = "ourmtg"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Netlify's secrets scanner cross-matches the VALUES of env vars marked "secret"
  # against the build output. The Supabase project URL and anon/publishable key are
  # PUBLIC by design (they ship in every Supabase client bundle via the VITE_* vars,
  # which hold the same values) — exclude them from scanning so their legitimate
  # presence in dist/ doesn't fail the build. SUPABASE_SERVICE_ROLE is deliberately
  # NOT listed: it must never appear in build output, and the scanner enforcing that
  # is protection we want to keep.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# SPA history fallback: client-side routing (react-router) serves index.html for any
# non-file, non-function path. Netlify resolves /.netlify/functions/* and real assets
# BEFORE this catch-all, so the API and static files are never shadowed.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers (Phase 1A §10) ──────────────────────────────────────────────
# Applied to every response. The CSP is deliberately conservative but compatible with the
# existing app: hashed self-hosted JS/CSS (no inline <script>), inline STYLE attributes
# (React style={{}} — hence style-src 'unsafe-inline'), QR/icon data: URLs, and Supabase
# for auth/storage/signed-URL fetches (https + wss *.supabase.co). Required external
# origins are documented in docs/OURMTG-SECURITY-HEADERS.md — update the CSP if a new one
# is added (e.g. analytics), or the app will break.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Never cache API/function responses (they carry per-user financial data). Functions also
# set Cache-Control: no-store themselves (_lib/portal.json); this is defense in depth.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"

# Long-cache the content-hashed static assets (safe: filenames change on content change).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
