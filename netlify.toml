# Branch claude/new-branch — Private Note Capital static site (repo root).
# OurMTG lives on `main`; this branch carries ONLY the PNC site so a Netlify
# site connected here deploys it with zero configuration.
[build]
  command = "echo 'static site — nothing to build'"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
