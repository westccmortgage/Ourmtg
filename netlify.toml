# Branch claude/new-branch — Private Note Capital static site in public/.
# Explicit publish dir (NOT ".") so Netlify never falls back to a stale "dist"
# publish setting. OurMTG lives on main; this branch carries only PNC.
[build]
  command = "echo 'static site — nothing to build'"
  publish = "public"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
