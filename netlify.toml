# Branch claude/new-branch — serves the Private Note Capital static site from the
# private-note-capital/ subdirectory. (main keeps the OurMTG config; this override
# lives only on this branch so a Netlify site connected here deploys PNC with zero
# UI configuration — no base directory, no build command needed.)
[build]
  command = "echo 'static site — nothing to build'"
  publish = "private-note-capital"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
