name: Tree Probe

on:
  pull_request:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Print verified Phase 1C tree SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          url = f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}/git/commits/ee8d23504ef804baec081860b19f1bce36d22619"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"})
          data = json.load(urllib.request.urlopen(req))
          print("VERIFIED_TREE_SHA=" + data["tree"]["sha"])
          PY
