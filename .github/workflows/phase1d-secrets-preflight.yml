name: Phase 1D Secrets Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - claude/ourmtg-phase1c-operational-pilot
    paths:
      - .github/workflows/phase1d-secrets-preflight.yml

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACCEPTANCE_URL: ${{ secrets.OURMTG_P1D_ACCEPTANCE_SUPABASE_URL }}
      ACCEPTANCE_DB_URL: ${{ secrets.OURMTG_P1D_ACCEPTANCE_DB_URL }}
      ACCEPTANCE_SERVER_KEY: ${{ secrets.OURMTG_P1D_ACCEPTANCE_SERVER_KEY }}
      ACCEPTANCE_CLIENT_KEY: ${{ secrets.OURMTG_P1D_ACCEPTANCE_CLIENT_KEY }}
      ACCEPTANCE_REF: ${{ secrets.OURMTG_P1D_ACCEPTANCE_PROJECT_REF }}
      ROLLBACK_URL: ${{ secrets.OURMTG_P1D_ROLLBACK_SUPABASE_URL }}
      ROLLBACK_DB_URL: ${{ secrets.OURMTG_P1D_ROLLBACK_DB_URL }}
      ROLLBACK_SERVER_KEY: ${{ secrets.OURMTG_P1D_ROLLBACK_SERVER_KEY }}
      ROLLBACK_CLIENT_KEY: ${{ secrets.OURMTG_P1D_ROLLBACK_CLIENT_KEY }}
      ROLLBACK_REF: ${{ secrets.OURMTG_P1D_ROLLBACK_PROJECT_REF }}
      PRODUCTION_REF: ${{ secrets.OURMTG_PRODUCTION_PROJECT_REF }}

    steps:
      - name: Validate secret presence and isolation
        shell: bash
        run: |
          set -euo pipefail
          required=(
            ACCEPTANCE_URL ACCEPTANCE_DB_URL ACCEPTANCE_SERVER_KEY ACCEPTANCE_CLIENT_KEY ACCEPTANCE_REF
            ROLLBACK_URL ROLLBACK_DB_URL ROLLBACK_SERVER_KEY ROLLBACK_CLIENT_KEY ROLLBACK_REF
            PRODUCTION_REF
          )

          for name in "${required[@]}"; do
            value="${!name:-}"
            if [[ -z "$value" || "$value" == "..." ]]; then
              echo "::error::$name is missing or still contains a placeholder"
              exit 1
            fi
          done

          [[ "$ACCEPTANCE_REF" != "$ROLLBACK_REF" ]] || { echo "::error::Acceptance and rollback refs are identical"; exit 1; }
          [[ "$ACCEPTANCE_REF" != "$PRODUCTION_REF" ]] || { echo "::error::Acceptance ref matches production"; exit 1; }
          [[ "$ROLLBACK_REF" != "$PRODUCTION_REF" ]] || { echo "::error::Rollback ref matches production"; exit 1; }

          [[ "$ACCEPTANCE_URL" == "https://${ACCEPTANCE_REF}.supabase.co" ]] || { echo "::error::Acceptance URL does not match acceptance ref"; exit 1; }
          [[ "$ROLLBACK_URL" == "https://${ROLLBACK_REF}.supabase.co" ]] || { echo "::error::Rollback URL does not match rollback ref"; exit 1; }
          [[ "$ACCEPTANCE_DB_URL" == postgresql://* || "$ACCEPTANCE_DB_URL" == postgres://* ]] || { echo "::error::Acceptance DB URL is not PostgreSQL"; exit 1; }
          [[ "$ROLLBACK_DB_URL" == postgresql://* || "$ROLLBACK_DB_URL" == postgres://* ]] || { echo "::error::Rollback DB URL is not PostgreSQL"; exit 1; }

          echo "Secret presence and environment isolation: PASS"

      - name: Ensure PostgreSQL client exists
        shell: bash
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: Test acceptance database connection
        shell: bash
        run: |
          set -euo pipefail
          psql "$ACCEPTANCE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "select 1" | grep -qx "1"
          echo "Acceptance database connection: PASS"

      - name: Test rollback database connection
        shell: bash
        run: |
          set -euo pipefail
          psql "$ROLLBACK_DB_URL" -v ON_ERROR_STOP=1 -Atqc "select 1" | grep -qx "1"
          echo "Rollback database connection: PASS"

      - name: Test acceptance Supabase API credentials
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "apikey: $ACCEPTANCE_SERVER_KEY" \
            -H "Authorization: Bearer $ACCEPTANCE_SERVER_KEY" \
            "$ACCEPTANCE_URL/rest/v1/")
          [[ "$code" == "200" ]] || { echo "::error::Acceptance API returned HTTP $code"; exit 1; }
          echo "Acceptance API credentials: PASS"

      - name: Test rollback Supabase API credentials
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "apikey: $ROLLBACK_SERVER_KEY" \
            -H "Authorization: Bearer $ROLLBACK_SERVER_KEY" \
            "$ROLLBACK_URL/rest/v1/")
          [[ "$code" == "200" ]] || { echo "::error::Rollback API returned HTTP $code"; exit 1; }
          echo "Rollback API credentials: PASS"

      - name: Final result
        run: |
          echo "Phase 1D infrastructure preflight: PASS"
          echo "No migrations were applied. Production was not contacted."
